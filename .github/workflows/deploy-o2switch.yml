name: Deploy to O2Switch

on:
  push:
    branches:
      - main  # Se déclenche sur push vers main
  workflow_dispatch:  # Permet de déclencher manuellement

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2. Setup Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            Frontend/package-lock.json
      
      # 3. Build Frontend
      - name: 📦 Build Frontend
        working-directory: ./Frontend
        run: |
          npm ci
          npm run build
      
      # 4. Build Backend
      - name: 📦 Build Backend
        working-directory: ./backend
        run: |
          npm ci
          npm run build
      
      # 5. Préparer les fichiers à déployer
      - name: 📋 Prepare deployment files
        run: |
          # Créer un dossier temporaire pour le déploiement
          mkdir -p deploy/frontend
          mkdir -p deploy/backend
          
          # Copier les fichiers frontend
          cp -r Frontend/dist/* deploy/frontend/
          cp Frontend/.htaccess deploy/frontend/
          
          # Copier les fichiers backend
          cp -r backend/dist deploy/backend/
          cp -r backend/prisma deploy/backend/
          cp backend/package.json deploy/backend/
          cp backend/package-lock.json deploy/backend/
          cp backend/.htaccess.o2switch deploy/backend/.htaccess
          
          # Créer le fichier .env depuis les secrets GitHub
          echo "PORT=3000" > deploy/backend/.env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> deploy/backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> deploy/backend/.env
          echo "MAVIANS_API_KEY=${{ secrets.MAVIANS_API_KEY }}" >> deploy/backend/.env
          echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" >> deploy/backend/.env
          echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> deploy/backend/.env
          echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> deploy/backend/.env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> deploy/backend/.env
          echo "NODE_ENV=production" >> deploy/backend/.env
      
      # 6. Déployer le Frontend via FTP
      - name: 🚀 Deploy Frontend to O2Switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/frontend/
          server-dir: /public_html/ngnipicba/MboaNexstar/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
      
      # 7. Déployer le Backend via FTP
      - name: 🚀 Deploy Backend to O2Switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/backend/
          server-dir: /public_html/ngnipicba/MboaNexstar/api/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
      
      # 8. Installer les dépendances et redémarrer via SSH
      - name: 🔄 Install dependencies and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /public_html/ngnipicba/MboaNexstar/api
            
            # Installer les dépendances
            npm install --production
            
            # Générer Prisma
            npx prisma generate
            
            # Créer les dossiers si nécessaire
            mkdir -p uploads/temp uploads/candidates uploads/sponsors whatsapp-auth
            chmod -R 777 uploads whatsapp-auth
            
            # Redémarrer PM2
            if pm2 list | grep -q "mboa-backend"; then
              pm2 restart mboa-backend
            else
              pm2 start dist/index.js --name mboa-backend
              pm2 save
            fi
            
            # Afficher le statut
            pm2 status
      
      # 9. Notification de succès
      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "✅ Déploiement réussi !"
          echo "🌐 Frontend: http://cdiu8226.cdwfs.net/ngnipicba/MboaNexstar/"
          echo "🔧 Backend: PM2 redémarré avec succès"
      
      # 10. Notification d'échec
      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "❌ Le déploiement a échoué"
          echo "Vérifiez les logs ci-dessus pour plus de détails"
